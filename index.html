<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }
        code, .mono { font-family: 'DM Mono', monospace; }
        body { background: #f5f4f0; min-height: 100vh; }

        /* Scrollbar */
        .gantt-scroll::-webkit-scrollbar { height: 6px; }
        .gantt-scroll::-webkit-scrollbar-track { background: transparent; }
        .gantt-scroll::-webkit-scrollbar-thumb { background: #c8c5bc; border-radius: 4px; }

        /* Q background bands */
        .q-band-q1 { background: rgba(59,130,246,0.04); }
        .q-band-q2 { background: rgba(16,185,129,0.04); }
        .q-band-q3 { background: rgba(245,158,11,0.04); }
        .q-band-q4 { background: rgba(139,92,246,0.04); }

        /* Row expand animation */
        .detail-panel { 
            max-height: 0; overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.3s ease;
            opacity: 0;
        }
        .detail-panel.open { max-height: 400px; opacity: 1; }

        /* Gantt bar */
        .gantt-bar {
            height: 22px;
            border-radius: 4px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            transition: filter 0.15s ease;
        }
        .gantt-bar:hover { filter: brightness(1.08); }

        /* Milestone diamond */
        .milestone {
            width: 12px; height: 12px;
            transform: rotate(45deg) translateY(-50%);
            position: absolute;
            top: 50%;
            margin-top: -6px;
            border-radius: 2px;
            z-index: 10;
        }

        /* Row hover */
        .gantt-row { transition: background 0.15s ease; }
        .gantt-row:hover { background: rgba(0,0,0,0.018); }
        .gantt-row.expanded { background: rgba(0,0,0,0.025); }

        /* Toggle switch */
        .toggle-pill {
            background: #1e1b18;
            border-radius: 99px;
            padding: 3px;
            display: inline-flex;
            gap: 2px;
        }
        .toggle-pill button {
            border-radius: 99px;
            padding: 5px 16px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .toggle-pill button.active { background: #fff; color: #1e1b18; }
        .toggle-pill button:not(.active) { background: transparent; color: rgba(255,255,255,0.5); }

        /* Status RAG dots */
        .rag-verde { background: #10b981; }
        .rag-amarillo { background: #f59e0b; }
        .rag-rojo { background: #ef4444; }

        /* Sticky left panel */
        .left-panel { width: 240px; min-width: 240px; flex-shrink: 0; }

        /* Category pills */
        .cat-banco { background: #dbeafe; color: #1d4ed8; }
        .cat-crosssell { background: #ede9fe; color: #6d28d9; }
        .cat-oper { background: #f1f5f9; color: #475569; }

        /* Badge */
        .badge-liberado { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
        .badge-encurso { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        .badge-banco2 { background: #ede9fe; color: #5b21b6; border: 1px solid #c4b5fd; }
        .badge-pendiente { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }

        .note-tbd { color: #92400e; background: #fef3c7; border-left: 3px solid #f59e0b; font-size: 11px; padding: 4px 8px; border-radius: 0 4px 4px 0; }

        /* ── MOBILE RESPONSIVE ──────────────────────────────────── */
        @media (max-width: 768px) {
            /* Toggle pill wraps on mobile */
            .toggle-pill { flex-wrap: wrap; border-radius: 12px; }
            .toggle-pill button { font-size: 11px; padding: 5px 12px; }

            /* Left panel narrower on mobile */
            .left-panel { width: 140px; min-width: 140px; }

            /* Detail panel grid stacks on mobile */
            .detail-grid { grid-template-columns: 1fr !important; gap: 12px !important; }

            /* Vision banner stacks on mobile */
            .vision-banner { flex-direction: column !important; gap: 12px !important; }
            .vision-banner-stat { text-align: left !important; }

            /* Status cards single column */
            .status-grid-2 { grid-template-columns: 1fr !important; }
            .status-grid-3 { grid-template-columns: 1fr !important; }

            /* Maintenance items wrap */
            .maintenance-wrap { flex-wrap: wrap; }

            /* Parked grid single col */
            .parked-grid { grid-template-columns: 1fr !important; }

            /* Top bar stacks */
            .topbar-inner { flex-direction: column; gap: 10px; align-items: flex-start !important; }
        }
        @media (max-width: 480px) {
            .left-panel { width: 120px; min-width: 120px; }
            .toggle-pill button { font-size: 10px; padding: 4px 10px; }
        }

        /* Accordion for collapsible tables */
        .accordion-content { 
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out;
            opacity: 0;
        }
        .accordion-content.open { max-height: 600px; opacity: 1; }
    </style>
</head>

                        </button>
                    </div>

                    {/* Gantt area */}
                    <div className="flex-1 relative flex items-center" style={{ minWidth: TOTAL_W }}>
                        {/* Q bands */}
                        {Q_BANDS.map(q => (
                            <div key={q.id} className={q.cls} style={{
                                position:'absolute', top:0, bottom:0,
                                left: q.start * MONTH_W, width: (q.end - q.start + 1) * MONTH_W,
                            }}/>
                        ))}

                        {/* Today line */}
                        <div style={{
                            position:'absolute', top:0, bottom:0, left: TODAY_X,
                            width:2, background:'rgba(239,68,68,0.5)', zIndex:5,
                        }}/>

                        {/* Bar */}
                        <div
                            className="gantt-bar"
                            style={{ 
                                left: barX, width: barW, 
                                background: project.status === 'banco2' 
                                    ? 'linear-gradient(135deg, #7c3aed 25%, #6d28d9 25%, #6d28d9 50%, #7c3aed 50%, #7c3aed 75%, #6d28d9 75%)' 
                                    : colors.bar,
                                backgroundSize: project.status === 'banco2' ? '8px 8px' : 'auto',
                                opacity: project.status === 'planned' ? 0.45 : 0.9,
                                boxShadow: project.status === 'banco2' ? '0 0 0 2px rgba(124,58,237,0.5), 0 2px 6px rgba(124,58,237,0.3)' : 'none',
                                height: project.status === 'banco2' ? '26px' : '22px',
                            }}
                            title={project.title}
                        />

                        {/* Milestone diamond */}
                        {msX >= 0 && msX <= TOTAL_W && (
                            <div style={{ position:'absolute', left: msX - 7, top:'50%', zIndex:8 }}>
                                <div
                                    className="milestone"
                                    style={{ background: colors.milestone, position:'relative', top:0, transform:'rotate(45deg)' }}
                                    title={project.milestoneLabel}
                                />
                                <div style={{
                                    position:'absolute', top: 12, left:'50%', transform:'translateX(-50%)',
                                    whiteSpace:'nowrap', fontSize:9, fontWeight:600, color: colors.milestone,
                                    background:'white', padding:'1px 4px', borderRadius:3, border:`1px solid ${colors.milestone}40`,
                                    letterSpacing:'0.02em'
                                }}>
                                    {project.milestoneLabel}
                                </div>
                            </div>
                        )}
                    </div>
                </div>

                {/* Detail panel */}
                <div className={`detail-panel ${open ? 'open' : ''}`}>
                    <div className="flex" style={{ background:'rgba(0,0,0,0.02)' }}>
                        {/* Spacer matching left panel */}
                        <div className="left-panel flex-shrink-0 border-r border-slate-200/80 px-4 py-3">
                            <div className="flex items-center gap-1.5">
                                <div className={`w-2 h-2 rounded-full ${RAG_CLS[project.rag]}`}/>
                                <span className="text-[11px] text-slate-500 font-medium">{project.ragNote}</span>
                            </div>
                        </div>
                        {/* Detail content */}
                        <div className="flex-1 px-6 py-4">
                            <div className="detail-grid grid grid-cols-3 gap-6">
                                <div>
                                    <p className="text-[10px] uppercase font-700 text-slate-400 mb-1 tracking-wider" style={{fontWeight:700}}>Descripción</p>
                                    <p className="text-xs text-slate-600 leading-relaxed">{project.description}</p>
                                    {project.startNote && (
                                        <div className="note-tbd mt-2 rounded">{project.startNote}</div>
                                    )}
                                    {project.releaseNote && (
                                        <div className="note-tbd mt-1.5 rounded">{project.releaseNote}</div>
                                    )}
                                </div>
                                <div>
                                    <p className="text-[10px] uppercase font-700 text-slate-400 mb-1 tracking-wider" style={{fontWeight:700}}>Impacto</p>
                                    <p className="text-xs text-slate-600 leading-relaxed">{project.impact}</p>
                                </div>
                                <div>
                                    <p className="text-[10px] uppercase font-700 text-slate-400 mb-1 tracking-wider" style={{fontWeight:700}}>KPIs</p>
                                    <ul className="space-y-1">
                                        {project.kpis.map((k,i) => (
                                            <li key={i} className="flex items-center gap-1.5 text-xs text-slate-600">
                                                <span className="w-1 h-1 rounded-full bg-slate-400 flex-shrink-0"/>
                                                {k}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // ── STATUS VIEW ─────────────────────────────────────────────────────────
    const StatusView = () => {
        const released   = PROJECTS.filter(p => p.status === 'released');
        const inprogress = PROJECTS.filter(p => p.status === 'inprogress');
        const next60     = PROJECTS.filter(p => p.status === 'planned' && p.startM <= 5);
        const banco2     = PROJECTS.filter(p => p.status === 'banco2');

        const Section = ({ title, color, children }) => (
            <div className="mb-7">
                <p className="text-[11px] font-700 uppercase tracking-widest mb-3" style={{color, fontWeight:700}}>{title}</p>
                {children}
            </div>
        );

        return (
            <div className="px-4 md:px-8 py-6 max-w-5xl mx-auto">
                {/* NPS Hero */}
                <div className="bg-slate-900 rounded-2xl p-6 mb-6 flex items-center justify-between">
                    <div>
                        <p className="text-slate-400 text-xs uppercase tracking-widest mb-1 font-600" style={{fontWeight:600}}>NPS Banca Electrónica</p>
                        <div className="flex items-end gap-3">
                            <div className="mb-1">
                                <span className="text-emerald-400 text-4xl font-700" style={{fontWeight:700}}>62</span>
                                <span className="text-slate-500 text-sm ml-2">objetivo 2026</span>
                            </div>
                        </div>
                    </div>

                </div>

                <Section title="Liberados ✓" color="#10b981">
                    <div className="status-grid-2 grid grid-cols-2 gap-3">
                        {released.map(p => (
                            <div key={p.id} className="bg-white rounded-xl p-4 border border-emerald-100 flex items-start gap-3">
                                <div className="w-2 h-2 rounded-full bg-emerald-500 mt-1.5 flex-shrink-0"/>
                                <div>
                                    <p className="font-600 text-sm text-slate-800" style={{fontWeight:600}}>{p.title}</p>
                                    <p className="text-xs text-emerald-600 font-500 mt-0.5" style={{fontWeight:500}}>{p.milestoneLabel}</p>
                                    <p className="text-xs text-slate-500 mt-1">{p.ragNote}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </Section>

                <Section title="En Curso" color="#3b82f6">
                    <div className="status-grid-2 grid grid-cols-2 gap-3">
                        {inprogress.map(p => (
                            <div key={p.id} className="bg-white rounded-xl p-4 border border-blue-100 flex items-start gap-3">
                                <div className="w-2 h-2 rounded-full bg-blue-500 mt-1.5 flex-shrink-0"/>
                                <div>
                                    <p className="font-600 text-sm text-slate-800" style={{fontWeight:600}}>{p.title}</p>
                                    <p className="text-xs text-blue-600 font-500 mt-0.5" style={{fontWeight:500}}>Entrega: {p.milestoneLabel}</p>
                                    <p className="text-xs text-slate-500 mt-1">{p.ragNote}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </Section>

                <Section title="Próximos 60 días" color="#f59e0b">
                    <div className="status-grid-3 grid grid-cols-3 gap-3">
                        {next60.map(p => (
                            <div key={p.id} className="bg-white rounded-xl p-4 border border-amber-100">
                                <div className="flex items-center gap-2 mb-1">
                                    <div className="w-2 h-2 rounded-full bg-amber-400 flex-shrink-0"/>
                                    <p className="text-sm text-slate-800 leading-tight" style={{fontWeight:600}}>{p.title}</p>
                                </div>
                                <p className="text-xs text-slate-500">{p.ragNote}</p>
                                {p.releaseNote && <p className="text-[10px] text-amber-700 mt-1.5 bg-amber-50 rounded px-2 py-1">{p.releaseNote}</p>}
                            </div>
                        ))}
                    </div>
                </Section>

                <Section title="Banco 2.0 — Iniciativas Transformacionales" color="#7c3aed">
                    <div className="status-grid-2 grid grid-cols-2 gap-3">
                        {banco2.map(p => (
                            <div key={p.id} className="bg-violet-50 rounded-xl p-4 border border-violet-200" style={{borderLeft:'3px solid #7c3aed'}}>
                                <div className="flex items-center justify-between mb-1">
                                    <div className="flex items-center gap-2">
                                        <IcCpu size={12} style={{stroke:'#7c3aed'}}/>
                                        <p className="text-sm text-slate-800 leading-tight" style={{fontWeight:600}}>{p.title}</p>
                                    </div>
                                    <span className="badge-banco2 text-[9px] px-1.5 py-0.5 rounded-full" style={{fontWeight:700}}>2.0</span>
                                </div>
                                <p className="text-xs text-slate-500 mt-1">{p.ragNote}</p>
                                {p.startNote && <p className="text-[10px] text-violet-700 mt-1.5 bg-violet-100 rounded px-2 py-1">{p.startNote}</p>}
                                {p.releaseNote && <p className="text-[10px] text-amber-700 mt-1 bg-amber-50 rounded px-2 py-1">{p.releaseNote}</p>}
                            </div>
                        ))}
                    </div>
                </Section>

                <Section title="Track Continuo" color="#64748b">
                    <div className="flex flex-wrap gap-2">
                        {MAINTENANCE.map((m,i) => (
                            <div key={i} className="bg-white rounded-lg px-3 py-2 border border-slate-200 flex items-center gap-2">
                                <IcWrench size={12} className="text-slate-400"/>
                                <span className="text-xs font-500 text-slate-600" style={{fontWeight:500}}>{m.title}</span>
                            </div>
                        ))}
                    </div>
                </Section>

                {/* Parked */}
                <details className="mt-2">
                    <summary className="cursor-pointer text-xs text-slate-400 hover:text-slate-600 flex items-center gap-2 select-none">
                        <IcPause size={12}/> Proyectos estacionados / sin prioridad 2026
                    </summary>
                    <div className="grid grid-cols-2 gap-3 mt-3">
                        {PARKED.map(p => (
                            <div key={p.id} className="bg-slate-50 rounded-lg p-3 border border-slate-200 border-dashed">
                                <p className="font-600 text-xs text-slate-600 mb-0.5" style={{fontWeight:600}}>{p.title}</p>
                                <p className="text-[11px] text-slate-400">{p.reason}</p>
                            </div>
                        ))}
                    </div>
                </details>
            </div>
        );
    };

    // ── GANTT VIEW ──────────────────────────────────────────────────────────
    const GanttView = () => {
        const scrollRef = useRef(null);
        const [showParked, setShowParked] = useState(false);

        return (
            <div>
                {/* Vision 2026 banner */}
                <div className="vision-banner mx-4 mt-4 mb-2 bg-slate-900 rounded-xl px-5 py-4 flex items-center justify-between gap-4">
                    <div className="flex-1">
                        <p className="text-slate-300 uppercase tracking-widest mb-1.5" style={{fontWeight:700, fontSize:'11px', letterSpacing:'0.12em'}}>Visión 2026</p>
                        <p className="text-white leading-relaxed" style={{fontWeight:400, fontSize:'15px'}}>
                            Nuestro objetivo para 2026 es transformarnos en el <span style={{color:'#60a5fa',fontWeight:600}}>banco de cabecera</span> del usuario. Este roadmap traza la ruta crítica para maximizar la <span style={{color:'#34d399',fontWeight:600}}>transaccionalidad diaria</span> y detonar la <span style={{color:'#fbbf24',fontWeight:600}}>venta cruzada inteligente</span>.
                        </p>
                    </div>
                    <div className="vision-banner-stat flex-shrink-0 text-center">
                        <div><p className="text-2xl font-700 text-white" style={{fontWeight:700}}>NPS → <span style={{color:'#34d399'}}>62</span></p><p className="text-[10px] text-slate-400 uppercase tracking-wider">Objetivo 2026</p></div>
                    </div>
                </div>

                {/* Mobile scroll hint */}
                <p className="px-4 pt-2 pb-1 text-[10px] text-slate-400 md:hidden">← Desliza para ver el timeline completo →</p>
                {/* Gantt table */}
                <div className="overflow-x-auto gantt-scroll" ref={scrollRef}>
                    <div style={{ minWidth: 240 + TOTAL_W + 32 }}>

                        {/* Header row */}
                        <div className="flex sticky top-0 z-20 bg-white border-b border-slate-200 shadow-sm">
                            <div className="left-panel flex-shrink-0 px-4 py-2 border-r border-slate-200">
                                <span className="text-[11px] font-700 text-slate-500 uppercase tracking-wider" style={{fontWeight:700}}>Proyecto</span>
                            </div>
                            <div className="flex-1 relative" style={{ minWidth: TOTAL_W }}>
                                    {/* Q label row */}
                                <div className="flex relative border-b border-slate-100" style={{height:20}}>
                                    {Q_BANDS.map(q => (
                                        <div key={q.id} className={q.cls} style={{
                                            position:'absolute', top:0, bottom:0,
                                            left: q.start * MONTH_W, width: (q.end - q.start + 1) * MONTH_W,
                                            display:'flex', alignItems:'center', justifyContent:'center',
                                            borderRight: '1px solid rgba(0,0,0,0.06)',
                                        }}>
                                            <span style={{color: q.hdr, fontWeight:700, fontSize:10, letterSpacing:'0.12em', textTransform:'uppercase', opacity:0.85}}>{q.label}</span>
                                        </div>
                                    ))}
                                </div>
                                {/* Month labels */}
                                <div className="flex relative z-10">
                                    {MONTHS.map((m, i) => (
                                        <div key={m} style={{ width: MONTH_W, flexShrink:0, padding:'4px 0 4px', borderRight:'1px solid rgba(0,0,0,0.04)' }} className="text-center">
                                            <span className="text-[10px] text-slate-400" style={{fontWeight:500}}>{m}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Project rows */}
                        <div className="bg-white">
                            {PROJECTS.map((p, i) => {
                                const prev = PROJECTS[i - 1];
                                const groupOrder = { released: 0, inprogress: 1, planned: 2, banco2: 3 };
                                const isGroupStart = i > 0 && groupOrder[p.status] !== groupOrder[prev.status];
                                return <GanttRow key={p.id} project={p} isLast={i === PROJECTS.length - 1} isGroupStart={isGroupStart}/>;
                            })}
                        </div>

                        {/* Today label */}
                        <div className="flex">
                            <div className="left-panel flex-shrink-0 border-r border-slate-200/80"/>
                            <div className="flex-1 relative" style={{ minWidth: TOTAL_W, height: 20 }}>
                                <div style={{
                                    position:'absolute', left: TODAY_X - 1, top: 0,
                                    fontSize:9, color:'#ef4444', fontWeight:600,
                                    background:'white', padding:'1px 4px', borderRadius:3,
                                    border:'1px solid #fca5a5', whiteSpace:'nowrap', transform:'translateX(-50%)'
                                }}>Hoy</div>
                            </div>
                        </div>

                    </div>
                </div>

                {/* Legend */}
                <div className="px-4 py-4 border-t border-slate-100 flex flex-wrap gap-3 items-center">
                    <span className="text-[10px] font-700 text-slate-400 uppercase tracking-wider" style={{fontWeight:700}}>Leyenda</span>
                    {Object.entries(BAR_COLORS).map(([k, c]) => {
                        const b = STATUS_BADGE[k];
                        const BIc = b.Icon;
                        return (
                            <div key={k} className="flex items-center gap-1.5">
                                <div style={{width:24, height:8, background:c.bar, borderRadius:3, opacity:0.75}}/>
                                <BIc size={10} style={{color:c.milestone}}/>
                                <span className="text-[10px] text-slate-500 font-500" style={{fontWeight:500}}>{b.label}</span>
                            </div>
                        );
                    })}
                    <div className="flex items-center gap-1.5 ml-2">
                        <div style={{width:10,height:10,background:'#065f46',borderRadius:2,transform:'rotate(45deg)'}}/>
                        <span className="text-[10px] text-slate-500">Hito de liberación</span>
                    </div>
                    <div className="flex items-center gap-1.5">
                        <div style={{width:2,height:16,background:'rgba(239,68,68,0.5)',borderRadius:1}}/>
                        <span className="text-[10px] text-slate-500">Hoy</span>
                    </div>
                </div>

                {/* Parked */}
                <div className="px-6 pb-6">
                    <button onClick={() => setShowParked(s => !s)}
                        className="flex items-center gap-2 text-xs text-slate-400 hover:text-slate-600 border border-dashed border-slate-300 rounded-lg px-3 py-2 transition-colors hover:bg-slate-50">
                        <IcPause size={12}/>
                        Proyectos estacionados / sin prioridad 2026
                        {showParked ? <IcChevUp size={11}/> : <IcChevDown size={11}/>}
                    </button>
                    {showParked && (
                        <div className="parked-grid mt-3 grid grid-cols-2 md:grid-cols-4 gap-3">
                            {PARKED.map(p => (
                                <div key={p.id} className="bg-slate-50 rounded-lg p-3 border border-dashed border-slate-200">
                                    <p className="font-600 text-xs text-slate-600 mb-0.5" style={{fontWeight:600}}>{p.title}</p>
                                    <p className="text-[10px] text-slate-400 leading-relaxed">{p.reason}</p>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Maintenance track */}
                    <div className="maintenance-wrap mt-4 bg-slate-800 rounded-xl p-4 flex flex-wrap items-center gap-3">
                        <div className="flex items-center gap-2 min-w-[140px]">
                            <IcWrench size={14} className="text-slate-400"/>
                            <div>
                                <p className="text-white text-xs font-600" style={{fontWeight:600}}>Track Continuo</p>
                                <p className="text-slate-500 text-[10px]">Mejoras transversales</p>
                            </div>
                        </div>
                        {MAINTENANCE.map((m,i) => (
                            <div key={i} className="bg-slate-700/60 rounded-lg px-3 py-1.5 border border-slate-600 flex items-center gap-1.5">
                                <IcInfo size={10} className="text-blue-400 flex-shrink-0"/>
                                <span className="text-xs text-slate-300 font-500" style={{fontWeight:500}}>{m.title}</span>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );
    };



    // ── APP ──────────────────────────────────────────────────────────────────
    const App = () => {
        const [view, setView] = useState('gantt');

        return (
            <div className="min-h-screen" style={{background:'#f5f4f0'}}>
                {/* Top bar */}
                <div className="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
                    <div className="topbar-inner flex items-center justify-between px-4 py-3 gap-3">
                        <div className="flex items-center gap-3">
                            <div className="w-7 h-7 rounded-lg bg-slate-900 flex items-center justify-center">
                                <IcTarget size={14} className="text-white"/>
                            </div>
                            <div>
                                <h1 className="text-slate-900 leading-none" style={{fontWeight:800, fontSize:'20px', letterSpacing:'-0.02em'}}>Actinver Digital</h1>
                                <p className="text-slate-400 leading-none mt-0.5" style={{fontWeight:500, fontSize:'11px'}}>Roadmap 2026</p>
                            </div>
                        </div>
                        <div className="toggle-pill">
                            <button className={view === 'gantt' ? 'active' : ''} onClick={() => setView('gantt')}>
                                🗓 Roadmap
                            </button>
                            <button className={view === 'status' ? 'active' : ''} onClick={() => setView('status')}>
                                📋 Status
                            </button>

                        </div>
                    </div>
                </div>

                {/* Content */}
                <div className={view === 'gantt' ? '' : 'py-4'}>
                    {view === 'gantt' ? <GanttView/> : <StatusView/>}
                </div>

                <footer className="text-center py-6">
                    <p className="text-[10px] text-slate-400 italic">Actinver Digital 2026 · Plan tentativo sujeto a cambios.</p>
                </footer>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
